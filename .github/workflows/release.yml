name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Resolve SPM dependencies
        working-directory: Murmur
        run: swift package resolve

      - name: Patch ORT for Float16 support
        working-directory: Murmur
        run: bash Scripts/patch-ort-float16.sh

      - name: Build release binary
        working-directory: Murmur
        run: swift build -c release

      - name: Assemble app bundle
        working-directory: Murmur
        run: |
          APP="dist/Murmur.app"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"

          # Find binary
          BINARY=".build/arm64-apple-macosx/release/Murmur"
          [ -f "$BINARY" ] || BINARY=".build/release/Murmur"
          cp "$BINARY" "$APP/Contents/MacOS/Murmur"

          # Info.plist with version from tag
          cp Info.plist "$APP/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIconFile string AppIcon" "$APP/Contents/Info.plist" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.version.outputs.VERSION }}" "$APP/Contents/Info.plist"

          # Resources
          cp Resources/AppIcon.icns "$APP/Contents/Resources/"
          cp Resources/transcribe.py "$APP/Contents/Resources/"
          cp Resources/requirements.txt "$APP/Contents/Resources/"

          # SPM resource bundle
          BUNDLE=".build/arm64-apple-macosx/release/Murmur_Murmur.bundle"
          [ -d "$BUNDLE" ] && cp -R "$BUNDLE" "$APP/Contents/Resources/" || true

          # Ad-hoc sign
          codesign --force --deep --sign - "$APP"

      - name: Create DMG with Applications shortcut
        working-directory: Murmur
        run: |
          # Create a staging folder with the app and an Applications symlink
          DMG_STAGE="dist/dmg-stage"
          rm -rf "$DMG_STAGE"
          mkdir -p "$DMG_STAGE"
          cp -R dist/Murmur.app "$DMG_STAGE/"
          ln -s /Applications "$DMG_STAGE/Applications"

          hdiutil create -volname "Murmur" -srcfolder "$DMG_STAGE" \
            -ov -format UDZO "dist/Murmur-${{ steps.version.outputs.VERSION }}.dmg"
          rm -rf "$DMG_STAGE"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Murmur/dist/Murmur-${{ steps.version.outputs.VERSION }}.dmg
          generate_release_notes: true
